spring:
  config:
    activate:
      on-profile: dev
  devtools:
    add-properties: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: LeaseLinkPool
      maximum-pool-size: 3
      minimum-idle: 0

      connection-timeout: 60000
      validation-timeout: 5000
      initialization-fail-timeout: -1

      idle-timeout: 60000
      max-lifetime: 540000

      leak-detection-threshold: 0
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: validate

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
openapi:
  service:
    api-docs: backend-leaselink
    title: Backend cho web LeaseLink
    version: 1.0.0
    server: http://localhost:${server.port}

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
