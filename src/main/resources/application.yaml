spring:
  application:
    name: backend-service
  profiles:
    active: @spring.profiles.active@
  config:
    import: optional:file:.env[.properties]

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO
    org.springframework.security: DEBUG

aws:
  s3:
    bucket-name: leaselink-storage-bucket
    region: ap-southeast-1  # (Singapore)
  credentials:
    access-key: ${ACCESS_KEY}
    secret-key: ${SECRET_KEY}

brevo:
  api-key: ${BREVO_API_KEY}
  base-url: ${BREVO_BASE_URL:https://api.brevo.com}
  sender-email: ${BREVO_SENDER_EMAIL}
  sender-name: ${BREVO_SENDER_NAME}
  sandbox: ${BREVO_SANDBOX}
  reset-code-expiry-minutes: ${RESET_CODE_EXPIRY_MINUTES}
  reset-token-expiry-minutes: ${RESET_TOKEN_EXPIRY_MINUTES}
  max-verify-attempts: ${RESET_MAX_VERIFY_ATTEMPTS}

