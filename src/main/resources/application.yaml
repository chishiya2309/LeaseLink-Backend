server:
  port: 8080

spring:
  application:
    name: backend-service
  profiles:
    active: @spring.profiles.active@
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 150MB
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: default
      password: ${REDIS_PASSWORD}
    cache:
      type: redis
      redis:
        time-to-live: 600000 # 10 minutes default
        cache-null-values: false

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO
    org.springframework.security: DEBUG

aws:
  s3:
    bucket-name: leaselink-storage-bucket
    region: ap-southeast-1  # (Singapore)
  credentials:
    access-key: ${ACCESS_KEY}
    secret-key: ${SECRET_KEY}

brevo:
  api-key: ${BREVO_API_KEY}
  base-url: ${BREVO_BASE_URL:https://api.brevo.com}
  sender-email: ${BREVO_SENDER_EMAIL}
  sender-name: ${BREVO_SENDER_NAME}
  sandbox: ${BREVO_SANDBOX}
  reset-code-expiry-minutes: ${RESET_CODE_EXPIRY_MINUTES}
  reset-token-expiry-minutes: ${RESET_TOKEN_EXPIRY_MINUTES}
  max-verify-attempts: ${RESET_MAX_VERIFY_ATTEMPTS}

gemini:
  api:
    key: ${GEMINI_API_KEY}
    base-url: ${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
    model: ${GEMINI_MODEL:gemini-2.5-flash}

