spring:
  datasource:
    url: jdbc:h2:mem:backend_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

openapi:
  service:
    api-docs: backend-leaselink
    title: Backend test docs
    version: 1.0.0-test
    server: http://localhost:8080

